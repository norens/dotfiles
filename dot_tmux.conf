set -g status-position bottom
set -g repeat-time 750
set -g status-interval 5
setw -g mode-keys vi
set -g mouse on

# Smooth scroll - 1 line at a time
bind -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down

# Move panes
bind S-Left  split-window -hbf \; swap-pane -t ! \; kill-pane -t !
bind S-Right split-window -hf  \; swap-pane -t ! \; kill-pane -t !
bind S-Up    split-window -bf  \; swap-pane -t ! \; kill-pane -t !
bind S-Down  split-window -f   \; swap-pane -t ! \; kill-pane -t !

# Start index from 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g pane-border-indicators colour
set -g pane-border-status off
set-hook -g window-layout-changed "if-shell -F '#{==:#{window_panes},1}' 'setw pane-border-status off' 'setw pane-border-status top'"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# Split horizontal / vertical
bind g split-window -h -c "#{pane_current_path}"
bind b split-window -v -c "#{pane_current_path}"

# Move windows left / right
bind-key -r J swap-window -d -t -1
bind-key -r K swap-window -d -t +1

# Switch to next / prev window
bind -n M-k next-window
bind -n M-j previous-window

# Rotate panes
bind-key -r -T prefix M-y rotate-window
bind-key -r -T prefix M-i rotate-window -D

bind-key @   choose-window 'join-pane -t "%%"'
bind-key M-@ choose-window 'join-pane -s "%%"'

# sesh — fuzzy session picker (Prefix+Space)
bind-key "Space" display-popup -E -w 80% -h 70% "sesh connect \"$(sesh list -i | fzf-tmux -p 80%,60% --no-sort --border-label ' sesh ' --prompt '⚡  ')\""

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin '~/.tmux/plugins/tmux-ghostty-theme'

# Ghostty-driven theme
set -g @ghostty-show-powerline on
set -g @ghostty-transparent-status on
set -g @ghostty-left-icon 'none'
set -g @ghostty-right-format 'claude-5h | claude-7d'

# Initialize TMUX plugin manager (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
