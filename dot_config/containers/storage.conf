# Rootless podman storage on @ml-data subvol (nodatacow inherited from parent)
# Default would be $HOME/.local/share/containers/storage (regular CoW = fragmentation risk).
# Spec: docs/cachyos-setup/specs/2026-05-24-ml-robotics-stack-design.md \u00a72
[storage]
driver = "overlay"
graphroot = "/home/nazarf/ml-data/containers-rootless"
runroot = "/run/user/1000/containers"

[storage.options.overlay]
mountopt = "nodev,metacopy=on"
