# Hyprland configuration — macOS-parity keybinds.
# Most non-keybind settings inherit Hyprland defaults intentionally;
# tighten them later as needs surface.

# ──────────────────────────────────────────────────────────────────────
# Variables
# ──────────────────────────────────────────────────────────────────────
$mainMod     = SUPER
$terminal    = ghostty
$fileManager = dolphin
$browser     = firefox
$menu        = wofi --show drun
$screenshots = $HOME/Pictures/Screenshots

# ──────────────────────────────────────────────────────────────────────
# Environment
# ──────────────────────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
# NVIDIA / Wayland — keep aligned with the proprietary-open driver.
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# ──────────────────────────────────────────────────────────────────────
# Autostart
# ──────────────────────────────────────────────────────────────────────
exec-once = mkdir -p $screenshots

# Background services (Plan 3 Desktop UX)
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent.service
exec-once = awww-daemon
exec-once = ~/.config/hypr/scripts/wallpaper-init.sh
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ──────────────────────────────────────────────────────────────────────
# Input — Ukrainian layout toggle on Right Ctrl
# ──────────────────────────────────────────────────────────────────────
input {
    kb_layout = us,ua
    kb_options = grp:rctrl_toggle
    repeat_rate = 50
    repeat_delay = 250
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

# ──────────────────────────────────────────────────────────────────────
# Apps — Mac-style launchers
# ──────────────────────────────────────────────────────────────────────
bind = $mainMod,       Return, exec, $terminal
bind = $mainMod,       Space,  exec, $menu
bind = $mainMod,       E,      exec, $fileManager
bind = $mainMod,       B,      exec, $browser

# ──────────────────────────────────────────────────────────────────────
# Window management — Mac parity where it maps
# ──────────────────────────────────────────────────────────────────────
bind = $mainMod,       W,      killactive,
bind = $mainMod,       Q,      killactive,
bind = $mainMod,       F,      fullscreen, 0
bind = $mainMod,       V,      togglefloating,
bind = $mainMod,       P,      pseudo,
bind = $mainMod SHIFT, Q,      exit,                # logout (Cmd+Shift+Q on Mac)
bind = $mainMod CTRL,  Q,      exec, hyprlock       # lock screen (Cmd+Ctrl+Q on Mac)

# Window switcher (Cmd+Tab analog)
bind = $mainMod,       Tab,    cyclenext,
bind = $mainMod SHIFT, Tab,    cyclenext, prev

# Hide-ish (Mac Cmd+H) — stash to a named special workspace
bind = $mainMod,       H,      togglespecialworkspace, hidden
bind = $mainMod SHIFT, H,      movetoworkspace, special:hidden

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Move active window
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Workspaces — SUPER+N to focus, SUPER+SHIFT+N to send window
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Between-Spaces swipe (Mac uses Ctrl+arrow — would clash with word-jump).
bind = $mainMod CTRL, left,  workspace, e-1
bind = $mainMod CTRL, right, workspace, e+1
bind = $mainMod, mouse_down,  workspace, e+1
bind = $mainMod, mouse_up,    workspace, e-1

# ──────────────────────────────────────────────────────────────────────
# Screenshots — Cmd+Shift+3/4 parity
# ──────────────────────────────────────────────────────────────────────
# Cmd+Shift+3 — full output → file + clipboard + notif
bind = $mainMod SHIFT, 3, exec, hyprshot -m output -o $screenshots
# Cmd+Shift+4 — region → file + clipboard + notif
bind = $mainMod SHIFT, 4, exec, hyprshot -m region -o $screenshots
# Cmd+Ctrl+Shift+4 — region → clipboard only (no file)
bind = $mainMod CTRL SHIFT, 4, exec, hyprshot -m region --clipboard-only
# Cmd+Shift+5 — region → satty annotate → save
bind = $mainMod SHIFT, 5, exec, hyprshot -m region -r | satty --filename - --output-dir $screenshots --early-exit --actions-on-enter save-to-clipboard

# ──────────────────────────────────────────────────────────────────────
# Multimedia keys
# ──────────────────────────────────────────────────────────────────────
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = ,XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = ,XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = ,XF86AudioPlay,        exec, playerctl play-pause
bindl  = ,XF86AudioNext,        exec, playerctl next
bindl  = ,XF86AudioPrev,        exec, playerctl previous

# ──────────────────────────────────────────────────────────────────────
# Mouse — Mod-drag move/resize (Mac doesn't really have this)
# ──────────────────────────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ──────────────────────────────────────────────────────────────────────
# Notifications (swaync control center)
# ──────────────────────────────────────────────────────────────────────
bind = $mainMod, N, exec, swaync-client -t -sw      # Cmd+N → toggle notification panel

# ──────────────────────────────────────────────────────────────────────
# Misc
# ──────────────────────────────────────────────────────────────────────
bind = $mainMod SHIFT, R, exec, hyprctl reload
