# hyprlock — Gruvbox Dark Hard styling
# Spec: docs/cachyos-setup/specs/2026-05-25-desktop-ux-design.md §6

general {
    disable_loading_bar = true
    grace = 0
    hide_cursor = true
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    contrast = 0.85
    brightness = 0.6
    vibrancy = 0.15
    vibrancy_darkness = 0.4
}

input-field {
    monitor =
    size = 320, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.5
    outer_color = rgba(60, 56, 54, 0.8)
    inner_color = rgba(40, 40, 40, 0.85)
    font_color = rgb(235, 219, 178)
    check_color = rgb(250, 189, 47)
    fail_color = rgb(251, 73, 52)
    fade_on_empty = true
    placeholder_text = <i><span foreground="##928374">Password…</span></i>
    hide_input = false
    rounding = 12
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +%H:%M)"
    color = rgb(235, 219, 178)
    font_size = 96
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    color = rgb(189, 174, 147)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}
