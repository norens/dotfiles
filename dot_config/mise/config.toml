[tools]
node   = "24"
"npm:pnpm" = "latest"   # aqua:pnpm/pnpm@latest fails on linux-x64 asset naming; npm-based works
python = "3.12"
go     = "latest"
rust   = "stable"
bun    = "latest"
deno   = "latest"

[settings]
# Read legacy version files like .nvmrc so existing projects work without
# converting to .tool-versions / .mise.toml.
idiomatic_version_file_enable_tools = ["node"]
