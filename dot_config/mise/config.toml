[tools]
node   = "24"
pnpm   = "latest"
python = "3.12"
go     = "latest"
rust   = "stable"
bun    = "latest"
deno   = "latest"

[settings]
# Read legacy version files like .nvmrc so existing projects work without
# converting to .tool-versions / .mise.toml.
idiomatic_version_file_enable_tools = ["node"]
